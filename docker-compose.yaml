services:

  ms1:
    image: node:20
    container_name: ms1
    working_dir: /app
    volumes:
      - ./ms-1:/app
    command: sh -c "npm install && npm start"
    expose:
      - "3000"
    networks:
      - replica_net

  ms1-1:
    image: node:20
    container_name: ms1-1
    working_dir: /app
    volumes:
      - ./ms-1:/app
    command: sh -c "npm install && npm start"
    expose:
      - "3000"
    networks:
      - replica_net

  ms2:
    image: node:20
    container_name: ms2
    working_dir: /app
    volumes:
      - ./ms-2:/app
    command: sh -c "npm install && npm start"
    expose:
      - "3000"
    networks:
      - replica_net

  ms2-2:
    image: node:20
    container_name: ms2-2
    working_dir: /app
    volumes:
      - ./ms-2:/app
    command: sh -c "npm install && npm start"
    expose:
      - "3000"
    networks:
      - replica_net

  nginx:
    image: nginx
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - ms1
      - ms1-1
      - ms2
      - ms2-2
    networks:
      - replica_net

networks:
  replica_net:
    external: true
    name: replica_default