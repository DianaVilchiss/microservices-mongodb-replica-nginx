
events {}

http{
    upstream backend {
        server ms1:3000;
        server ms1-1:3000;
    }

    upstream backend2{
        server ms2:3000;
        server ms2-2:3000;
    }

    server{
        listen 80;
        location /api1/{
            proxy_pass http://backend/;
            proxy_set_header HOST $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location /api2/{
            proxy_pass http://backend2/;
            proxy_set_header HOST $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}



